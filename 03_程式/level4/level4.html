<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>第四章：回音洞穴</title>
    <link rel="stylesheet" href="level4.css">
</head>
<body>

<div id="level4-container">

    <div id="dark-screen"></div>

    <img id="antlers" src="../../02_素材/圖卡/sacred_antlers.png">
    <div id="light-beam"></div>

    <div id="story-box">
        <div id="story-text">
            <p>神聖鹿角似乎感應到了某種力量……</p>
            <p>遠方的山谷深處，</p>
            <p>傳來奇怪的回音。</p>
            <p>那些聲音不停重複著，</p>
            <p>卻找不到屬於自己的夥伴。</p>
            <p>為了找出原因，</p>
            <p>你循著鹿角的指引，</p>
            <p>來到了回音洞穴。</p>
            <p>據說在這裡，</p>
            <p>擁有相同起始聲音的朋友，</p>
            <p>會互相吸引。</p>
            <p>只有幫助它們找到彼此，</p>
            <p>洞穴的聲音魔法才能恢復平衡。</p>
        </div>
    </div>

    <img id="bear" src="../../02_素材/角色/bear_guardian.png">

    <div id="bear-dialog">
        <p>歡迎來到回音洞穴！</p>
        <p>我是回音長老。</p>
        <p>請幫助迷失的聲音，</p>
        <p>找到相同開頭聲音的朋友吧！</p>
    </div>

    <button id="start-btn">開始探索回音洞穴</button>

    <div id="game-area">
        <div id="question-count">第 1 / 5 題</div>

        <button id="sound-btn">🔊</button>

        <div id="hint-text">請選出相同開頭聲音的朋友</div>

        <div id="options"></div>

        <div id="feedback"></div>
    </div>

    <div id="complete-box">
        <p>太好了！</p>
        <p>回音洞穴恢復平靜了。</p>
        <p>所有迷失的聲音都回到了正確的位置。</p>
        <p>你獲得了 💎 回音水晶！</p>
        <button id="next-btn">前往下一個區域</button>
    </div>

</div>

<audio
    id="bgm"
    src="../../04_音檔/Pooka - Kevin MacLeod.mp3"
    loop>
</audio>

<script src="level4.js"></script>
</body>
</html>
